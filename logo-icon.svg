<!-- Tensure Logo SVG - 双T绿+蓝组合图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <!-- 绿色 T（左） -->
  <g>
    <!-- 绿T横梁 -->
    <rect x="8" y="8" width="46" height="14" rx="4" fill="url(#greenGrad)"/>
    <!-- 绿T竖柱 -->
    <rect x="16" y="8" width="16" height="52" rx="4" fill="url(#greenGrad)"/>
  </g>
  <!-- 蓝色 T（右，叠加在绿T上方） -->
  <g>
    <!-- 蓝T横梁 -->
    <rect x="38" y="8" width="46" height="14" rx="4" fill="url(#blueGrad)"/>
    <!-- 蓝T竖柱 -->
    <rect x="68" y="8" width="16" height="38" rx="4" fill="url(#blueGrad)"/>
    <!-- 蓝T小方块（右下角装饰） -->
    <rect x="68" y="52" width="16" height="8" rx="3" fill="url(#blueGrad)"/>
  </g>
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DE89F"/>
      <stop offset="100%" stop-color="#10C87A"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B9CF5"/>
      <stop offset="100%" stop-color="#1456F0"/>
    </linearGradient>
  </defs>
</svg>
